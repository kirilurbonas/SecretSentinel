name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run tests
        run: |
          cd cli && go test -cover ./...
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: cli

  detection:
    name: Detection (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd detection && pip install -e ".[dev]"
      - name: Ruff
        run: cd detection && ruff check app/
      - name: Mypy
        run: cd detection && mypy app/
      - name: Pytest
        run: cd detection && pytest tests/ -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [cli, detection]
    steps:
      - uses: actions/checkout@v4
      - name: Build CLI
        run: |
          cd cli && CGO_ENABLED=0 go build -o sentineld ./cmd/sentineld
      - name: Build detection image
        run: docker build -t secretsentinel-detection:latest ./detection
