# Production: detection service only. Run with:
#   cd infra && docker compose -f docker-compose.prod.yml up -d

services:
  detection:
    build:
      context: ../detection
      dockerfile: Dockerfile
    container_name: secretsentinel-detection
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
