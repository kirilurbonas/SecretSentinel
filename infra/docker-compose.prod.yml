# Production stack — all six services with resource limits, network isolation,
# and structured logging. Run with:
#   cd infra && docker compose -f docker-compose.prod.yml up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  postgres_data_prod:

services:
  # ── Detection (Python / FastAPI) ────────────────────────────────────────────
  detection:
    build:
      context: ../detection
      dockerfile: Dockerfile
    container_name: secretsentinel-detection-prod
    networks: [backend]
    environment:
      - PYTHONUNBUFFERED=1
      - SENTINEL_MIN_CONFIDENCE=${SENTINEL_MIN_CONFIDENCE:-0.5}
      - SENTINEL_DISABLED_RULES=${SENTINEL_DISABLED_RULES:-}
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 128M
    logging: *default-logging

  # ── Vault (Node.js / Express) ────────────────────────────────────────────────
  vault:
    build:
      context: ../vault
      dockerfile: Dockerfile
    container_name: secretsentinel-vault-prod
    networks: [backend]
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://sentinel:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/sentinel
      - VAULT_AUTH_SECRET=${VAULT_AUTH_SECRET:?VAULT_AUTH_SECRET must be set}
      - VAULT_ENCRYPTION_KEY=${VAULT_ENCRYPTION_KEY:?VAULT_ENCRYPTION_KEY must be set}
    depends_on:
      db:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 64M
    logging: *default-logging

  # ── API Gateway (Node.js / Express + Apollo) ─────────────────────────────────
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: secretsentinel-api-prod
    networks: [frontend, backend]
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DETECTION_URL=http://detection:8000
      - VAULT_URL=http://vault:3000
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    depends_on:
      detection:
        condition: service_healthy
      vault:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 64M
    logging: *default-logging

  # ── Rotation Worker (Node.js / SQS) ──────────────────────────────────────────
  rotation:
    build:
      context: ../rotation
      dockerfile: Dockerfile
    container_name: secretsentinel-rotation-prod
    networks: [backend]
    environment:
      - VAULT_URL=http://vault:3000
      - VAULT_AUTH_SECRET=${VAULT_AUTH_SECRET:?VAULT_AUTH_SECRET must be set}
      - SQS_ROTATION_QUEUE_URL=${SQS_ROTATION_QUEUE_URL:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      vault:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/sentinel-alive"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.10"
        reservations:
          memory: 32M
    logging: *default-logging

  # ── Dashboard (React / nginx) ─────────────────────────────────────────────────
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: secretsentinel-dashboard-prod
    networks: [frontend]
    ports:
      - "8080:8080"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.10"
        reservations:
          memory: 16M
    logging: *default-logging

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: secretsentinel-postgres-prod
    networks: [backend]
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=sentinel
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 128M
    logging: *default-logging
