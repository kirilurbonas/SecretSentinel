services:
  detection:
    build:
      context: ../detection
      dockerfile: Dockerfile
    container_name: secretsentinel-detection
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  vault:
    build:
      context: ../vault
      dockerfile: Dockerfile
    container_name: secretsentinel-vault
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    restart: unless-stopped

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: secretsentinel-api
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DETECTION_URL=http://detection:8000
      - VAULT_URL=http://vault:3000
    depends_on:
      - detection
      - vault
    restart: unless-stopped

  rotation:
    build:
      context: ../rotation
      dockerfile: Dockerfile
    container_name: secretsentinel-rotation
    environment:
      - VAULT_URL=http://vault:3000
      - SQS_ROTATION_QUEUE_URL=${SQS_ROTATION_QUEUE_URL:-}
    depends_on:
      - vault
    restart: unless-stopped

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: secretsentinel-dashboard
    ports:
      - "8080:8080"
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: secretsentinel-postgres
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel
      - POSTGRES_DB=sentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
